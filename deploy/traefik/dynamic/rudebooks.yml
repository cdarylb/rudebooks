http:
  routers:
    rudebooks:
      rule: "Host(`rudebooks.cyrilb.me`)"
      entryPoints:
        - websecure
      service: rudebooks-svc
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt

  services:
    rudebooks-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3002"

  middlewares:
    security-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
